# buildspec/buildspec-build.yml
# BUILD STAGE
# Installs Python dependencies, runs linting, and packages the Lambda zip.
# Output: lambda-deployment.zip (contains handler + site-packages)

version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install --upgrade pip

  pre_build:
    commands:
      - echo "=== Linting ==="
      - pip install flake8 --quiet
      - flake8 depositor/ --max-line-length=120 --exclude=__pycache__
      - echo "=== Lint passed ==="

  build:
    commands:
      - echo "=== Installing runtime dependencies ==="
      - pip install -r requirements.txt -t package/ --quiet
      - echo "=== Packaging Lambda zip ==="
      - cp -r depositor/* package/
      - cd package && zip -r ../lambda-deployment.zip . -x "*.pyc" -x "*/__pycache__/*"
      - cd ..
      - echo "=== Package size ===" && du -sh lambda-deployment.zip

  post_build:
    commands:
      - echo "Build complete at $(date)"

artifacts:
  files:
    - requirements.txt
    - lambda-deployment.zip
    - buildspec/**/*
    - depositor/**/*
    - tests/**/*
  discard-paths: no

cache:
  paths:
    - /root/.cache/pip/**/*
